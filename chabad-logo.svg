<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" dir="rtl">
  <defs>
    <linearGradient id="flagBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b1c2a"/>
      <stop offset="100%" stop-color="#5a1623"/>
    </linearGradient>
  </defs>
  <!-- Flag / banner shape with wavy bottom -->
  <path d="M0,0 L400,0 L400,170 Q350,155 300,165 Q250,175 200,155 Q150,135 100,160 Q50,180 0,165 Z" fill="url(#flagBg)"/>
  <!-- חב"ד text - large bold -->
  <text x="200" y="108" text-anchor="middle" font-family="'Frank Ruhl Libre','David','SBL Hebrew','Arial Hebrew',serif" font-size="110" font-weight="900" letter-spacing="2" direction="rtl">
    <tspan fill="white">ח</tspan><tspan fill="#f5a623" dx="-4">ב</tspan><tspan fill="white" font-size="55" dy="-30" dx="-2">״</tspan><tspan fill="white" font-size="110" dy="30" dx="-4">ד</tspan>
  </text>
  <!-- כל הלב לכל אחד slogan -->
  <text x="200" y="148" text-anchor="middle" font-family="'Frank Ruhl Libre','David','SBL Hebrew','Arial Hebrew',serif" font-size="26" fill="rgba(255,255,255,0.9)" font-weight="700" letter-spacing="3" direction="rtl">כל הלב לכל אחד</text>
</svg>
