      <stop offset="0%" stop-color="#6b1c2a"/>
      <stop offset="50%" stop-color="#7a2035"/>
      <stop offset="100%" stop-color="#6b1c2a"/>
    </linearGradient>
  </defs>
  <!-- Flag shape -->
  <path d="M10,5 L270,5 Q275,5 275,10 L275,130 Q275,145 260,140 L140,115 L20,140 Q5,145 5,130 L5,10 Q5,5 10,5 Z" fill="url(#flag)"/>
