<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta id="appViewport" name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הגבאי הדיגיטלי</title>
  <style>
    html,body{margin:0;padding:0;height:100%;background:#f8fafc}
    iframe{border:0;width:100%;height:100%}
    .loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:#4f46e5;font-weight:700;background:#f8fafc;z-index:10}
  </style>
</head>
<body>
  <div id="loading" class="loading">🤖 טוען את הגבאי הדיגיטלי…</div>
  <iframe id="appFrame" src="about:blank" title="הגבאי הדיגיטלי"></iframe>
  <script>
    (async function () {
      const APP_HTML = '/Aliyot-Pro-CHABAD_Pro_DIGI_cloudflare_ready.html';
      const REMOTE_ENDPOINT = '/api/state';
      const SITE_ID = 'chabad-main';
      const SYNC_KEYS = ['gabbai_db_v7_final','gabbai_attendance','gabbai_notes','gabbai_tags'];
      const DIRECT_TABS = new Set(['dashboard', 'entry', 'insights', 'recommendations', 'longabsent', 'members', 'trends', 'history']);
      let lastSnapshot = '';
      let hashListenerBound = false;
      function snapshotStore() {
        const localStore = {};
        SYNC_KEYS.forEach((key) => {
          const value = localStorage.getItem(key);
          if (typeof value === 'string') localStore[key] = value;
        });
        return localStore;
      }

      async function pullRemoteStore() {
        try {
          const res = await fetch(REMOTE_ENDPOINT, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json', 'X-Gabbai-Site': SITE_ID }
          });
          if (!res.ok) return;
          const payload = await res.json();
          const store = payload && payload.state && payload.state.localStore;
          if (!store || typeof store !== 'object') return;
          Object.entries(store).forEach(([key, value]) => {
            if (typeof value === 'string') localStorage.setItem(key, value);
          });
        } catch (err) {
          console.warn('Remote bootstrap failed:', err);
        }
      }

      async function pushRemoteStore() {
        try {
          const localStore = snapshotStore();
          const snapshot = JSON.stringify(localStore);
          if (snapshot === lastSnapshot) return;
          lastSnapshot = snapshot;
          let schemaVersion = 2;
          try {
            const parsed = localStore['gabbai_db_v7_final'] ? JSON.parse(localStore['gabbai_db_v7_final']) : null;
            schemaVersion = parsed && parsed.schemaVersion ? parsed.schemaVersion : 2;
          } catch (_) {}
          await fetch(REMOTE_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Gabbai-Site': SITE_ID },
            body: JSON.stringify({
              namespace: 'gabbai-db',
              siteId: SITE_ID,
              schemaVersion: schemaVersion,
              state: { localStore: localStore }
            })
          });
        } catch (err) {
          console.warn('Remote push failed:', err);
        }
      }

      function applyTrendsHotfix(frameWindow) {
        if (!frameWindow) return;
        if (typeof frameWindow.isSpecialRole === 'function') return;

        frameWindow.isSpecialRole = function isSpecialRole(memberName) {
          if (!memberName || typeof memberName !== 'string') return false;

          const name = memberName.trim().toLowerCase();
          if (name === 'אורח' || name.includes('אורח') || name.includes('- אורח')) return true;

          let history = [];
          try {
            history = (typeof frameWindow.loadData === 'function' && frameWindow.loadData().history) || [];
          } catch (_) {}

          const hasKohenTag = history.some((h) =>
            (h.names || []).some((n) => n.includes(memberName) && n.includes('(כהן)'))
          );
          const hasLeviTag = history.some((h) =>
            (h.names || []).some((n) => n.includes(memberName) && n.includes('(לוי)'))
          );

          const hasKohenInName = name.includes(' כהן') || name.endsWith('כהן') || name.includes('- כהן');
          const hasLeviInName = name.includes('- לוי') || name.endsWith('- לוי');
          const isRabbi = name.includes('הרב') || name.startsWith('רב ') || name.includes('הכט') || name.includes('זאינאץ');

          return hasKohenTag || hasLeviTag || hasKohenInName || hasLeviInName || isRabbi;
        };
      }

      function openTabFromHash(frameWindow) {
        if (!frameWindow || typeof frameWindow.switchTab !== 'function') return;
        const hash = window.location.hash.replace(/^#/, '').trim().toLowerCase();
        if (!DIRECT_TABS.has(hash)) return;
        frameWindow.switchTab(hash);
      }

      function configureViewportForDevice() {
        const viewportMeta = document.getElementById('appViewport');
        if (!viewportMeta) return;

        const isiOS = /iP(hone|ad|od)/.test(navigator.userAgent) ||
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        const viewport = isiOS
          ? 'width=device-width, initial-scale=1.0, viewport-fit=cover'
          : 'width=device-width, initial-scale=1.0';

        viewportMeta.setAttribute('content', viewport);
      }

      configureViewportForDevice();
      window.addEventListener('resize', configureViewportForDevice);

      await pullRemoteStore();
      document.getElementById('appFrame').src = APP_HTML;
      document.getElementById('appFrame').addEventListener('load', function(){
        document.getElementById('loading').style.display = 'none';
        const frameWindow = document.getElementById('appFrame').contentWindow;
        applyTrendsHotfix(frameWindow);
        openTabFromHash(frameWindow);
        if (!hashListenerBound) {
          window.addEventListener('hashchange', function () {
            openTabFromHash(document.getElementById('appFrame').contentWindow);
          });
          hashListenerBound = true;
        }
      });
      setInterval(pushRemoteStore, 2000);
      window.addEventListener('beforeunload', pushRemoteStore);
    })().catch((err) => {
      document.getElementById('loading').textContent = 'שגיאה בטעינת המערכת';
      console.error(err);
    });
  </script>
</body>
</html>
