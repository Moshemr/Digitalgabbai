<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הגבאי הדיגיטלי AI - המערכת המלאה (Refactored)</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header id="app-header" class="app-header" role="banner"></header>

    <!-- Main Navigation Tabs -->
    <nav id="app-tabs" class="app-tabs" role="tablist"></nav>

    <!-- Main Content -->
    <main id="app-main" class="app-main" role="main">
      <div id="tab-dashboard" class="tab-panel active" role="tabpanel" aria-labelledby="tab-btn-dashboard"></div>
      <div id="tab-entry" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-entry"></div>
      <div id="tab-insights" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-insights"></div>
      <div id="tab-recommendations" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-recommendations"></div>
      <div id="tab-longabsent" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-longabsent"></div>
      <div id="tab-members" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-members"></div>
      <div id="tab-trends" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-trends"></div>
      <div id="tab-history" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-history"></div>
    </main>

    <!-- Modals -->
    <div id="profile-modal" class="modal" role="dialog" aria-hidden="true"></div>
  </div>

  <!-- Scripts -->
  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
